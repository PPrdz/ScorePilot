function getTechName(){
const map={quiz:'Quiz',exos:'Exercices',controle:'Mini contrôle',flashcards:'Flashcards'};
return map[tech]||'IA';
}

async function generateContent(){
if(tech==='quiz')await generateQuiz();
else if(tech==='exos')await generateExercise();
else if(tech==='controle')await generateMiniControle();
else await generateFlashcards();
}

async function generateQuiz(){
try{
const fileContext=uploadedFiles.length>0?`\n\nDocuments fournis par l'élève:\n${uploadedFiles.map(f=>`- ${f.name}: ${f.content.substring(0,500)}`).join('\n')}`:'';
const prompt=`Génère un QCM de 5 questions sur ${config.theme} en ${config.mat}.${fileContext}\n\nFormat JSON strict:\n[{"q":"Question?","opts":["A","B","C","D"],"correct":0}]\nRéponds UNIQUEMENT en JSON valide.`;
const res=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:MODEL,
max_tokens:2000,
messages:[{role:'user',content:prompt}]
})
}).catch(err=>{throw new Error('Failed to fetch - Vérifie ta connexion internet')});
if(!res.ok){
const errorText=await res.text();
throw new Error(`HTTP ${res.status}: ${errorText}`);
}
const data=await res.json();
let text=data.choices[0].message.content;
text=text.replace(/```json|```/g,'').trim();
const quiz=JSON.parse(text);
currentQuiz=quiz;
currentContent=JSON.stringify(quiz,null,2);
displayQuiz(0);
}catch(e){
document.getElementById('blackboard').innerHTML=`<div style="padding:40px;text-align:center;color:#ef4444;">❌ Erreur IA: ${e.message}</div>`;
addMsg('❌ '+e.message,'ai');
}
}

let quizScore=0,quizIndex=0;
function displayQuiz(idx){
if(idx>=currentQuiz.length){
document.getElementById('blackboard').innerHTML=`<div style="text-align:center;padding:60px;"><div style="font-size:64px;margin-bottom:20px;">🎉</div><div style="font-size:32px;font-weight:900;margin-bottom:12px;">Quiz terminé !</div><div style="font-size:20px;color:#818cf8;">Score: ${quizScore}/${currentQuiz.length}</div><button class="btn" style="max-width:300px;margin:32px auto 0;" onclick="generateQuiz()">Nouveau quiz</button></div>`;
return;
}
const q=currentQuiz[idx];
document.getElementById('blackboard').innerHTML=`
<div class="quiz-card">
<div style="font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:16px;">Question ${idx+1}/${currentQuiz.length}</div>
<div class="quiz-question">${q.q}</div>
<div class="quiz-options">
${q.opts.map((opt,i)=>`<div class="quiz-option" onclick="checkAnswer(${i},${q.correct})">${opt}</div>`).join('')}
</div>
</div>
`;
addMsg(`Question ${idx+1} affichée`,'ai');
}

function checkAnswer(selected,correct){
const opts=document.querySelectorAll('.quiz-option');
opts.forEach((opt,i)=>{
opt.style.pointerEvents='none';
if(i===correct)opt.classList.add('correct');
else if(i===selected)opt.classList.add('wrong');
});
if(selected===correct){quizScore++;addMsg('✅ Bonne réponse !','ai');}
else{addMsg(`❌ Mauvaise réponse. La bonne était: ${correct+1}`,'ai');}
quizIndex++;
setTimeout(()=>displayQuiz(quizIndex),2000);
}

const fileContext=uploadedFiles.length>0?`\n\nDocuments fournis par l'élève:\n${uploadedFiles.map(f=>`- ${f.name}: ${f.content}`).join('\n')}`:'';
const prompt=`Génère un exercice pratique sur ${config.theme} en ${config.mat}.${fileContext}\n\nIMPORTANT: Donne UNIQUEMENT l'énoncé de l'exercice, PAS la solution. L'élève doit pouvoir répondre sans voir la réponse. Utilise le markdown pour formater (** pour gras, * pour italique, ### pour titres).`;
const res=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:MODEL,
max_tokens:1500,
messages:[{role:'user',content:prompt}]
})
}).catch(err=>{throw new Error('Failed to fetch')});
if(!res.ok)throw new Error(`HTTP ${res.status}`);
const data=await res.json();
const text=data.choices[0].message.content;
currentContent=text;
const formatted=formatMarkdown(text);
document.getElementById('blackboard').innerHTML=`

<div style="font-size:24px;font-weight:800;margin-bottom:20px;">✍️ Exercice</div>

<button class="correction-btn" onclick="correctExercise()">✓ Demander la correction</button>

addMsg('Exercice généré','ai');
}catch(e){
document.getElementById('blackboard').innerHTML=`<div style="padding:40px;color:#ef4444;">❌ Erreur: ${e.message}</div>`;
addMsg('❌ '+e.message,'ai');
}
}

const prompt=`Génère un mini contrôle (3 exercices) sur ${config.theme} en ${config.mat}, durée ${config.duree}.${fileContext}\n\nIMPORTANT: 
- Donne UNIQUEMENT les énoncés des 3 exercices, PAS les solutions

- Utilise le markdown pour formater (** pour gras, * pour italique)

const res=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:MODEL,
max_tokens:2000,
messages:[{role:'user',content:prompt}]
})
}).catch(err=>{throw new Error('Failed to fetch')});
if(!res.ok)throw new Error(`HTTP ${res.status}`);
const data=await res.json();
const text=data.choices[0].message.content;
currentContent=text;
const formatted=formatMarkdown(text);
// Split by exercise headers
const exercises=formatted.split(/<h3[^>]*>Exercice \d+[^<]*<\/h3>/gi);
const headers=formatted.match(/<h3[^>]*>Exercice \d+[^<]*<\/h3>/gi)||[];

</div>`;
}

const res=await fetch(API_URL,{
method:'POST',
headers:{
'Content-Type':'application/json',
'Authorization':`Bearer ${API_KEY}`
},
body:JSON.stringify({
model:MODEL,
max_tokens:2000,
messages:[{role:'user',content:prompt}]
})
}).catch(err=>{throw new Error('Failed to fetch')});
if(!res.ok)throw new Error(`HTTP ${res.status}`);
const data=await res.json();
let text=data.choices[0].message.content;
text=text.replace(/```json|```/g,'').trim();
const cards=JSON.parse(text);

function startTimer(){
timerInt=setInterval(()=>{
if(isPaused){
pauseTimeLeft--;
if(pauseTimeLeft<=0){
endPause();
}
updatePauseDisplay();
return;
}
timerSec++;
const m=Math.floor(timerSec/60);
const s=timerSec%60;
const el=document.getElementById('timer');
if(el)el.textContent=`${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
const breakEl=document.getElementById('nextBreak');
if(breakEl){
const timeUntilBreak=nextBreakTime-timerSec;
if(timeUntilBreak<=0){
startPause();
}else{
const bm=Math.floor(timeUntilBreak/60);
const bs=timeUntilBreak%60;
breakEl.textContent=`⏸️ Pause dans ${bm}:${bs.toString().padStart(2,'0')}`;
}
}
},1000);
}

function startPause(){
isPaused=true;
pauseTimeLeft=breakDuration;
nextBreakTime+=workDuration+breakDuration;
showPauseOverlay();
}

function endPause(){
isPaused=false;
hidePauseOverlay();
}

function showPauseOverlay(){
const overlay=document.createElement('div');
overlay.id='pauseOverlay';
overlay.className='pause-overlay';
overlay.innerHTML=`
<div class="pause-text"><span class="pause-emoji">⏸️</span> PAUSE</div>

<div class="pause-timer" id="pauseTimer">5:00</div>
<div style="font-size:16px;color:rgba(255,255,255,0.5);">Reprise de la session dans...</div>

function updatePauseDisplay(){
const pTimer=document.getElementById('pauseTimer');
if(pTimer){
const m=Math.floor(pauseTimeLeft/60);
const s=pauseTimeLeft%60;
pTimer.textContent=`${m}:${s.toString().padStart(2,'0')}`;
}
}

function stopSession(){
clearInterval(timerInt);
const durationMin=Math.floor(timerSec/60);
if(timerSec>=600){
// Créditer les RR
const pts=parseInt(localStorage.getItem(`sp_points_${userId}`)||'0');
const earned=10+Math.floor((timerSec-600)/300)*2; // +2 RR chaque 5 min supplémentaires
localStorage.setItem(`sp_points_${userId}`,pts+earned);
localStorage.setItem(`scorepilot_points_${userId}`,pts+earned);
// Intégrer au système de rang si un quiz a été fait
if(quizIndex>0&&typeof window.addMatchToRanking==='function'){
const matchData={
subject:config.mat||'Révision',
totalQuestions:Math.max(quizIndex,1),
correctAnswers:quizScore,
duration:`${durationMin} min`
};
const match=window.addMatchToRanking(matchData);
sessionStorage.setItem('lastMatch',JSON.stringify(match));
}
showSessionResult(durationMin,earned);
}else{
showSessionTooShort(durationMin);
}
}

function formatMarkdown(text){
// First, protect math formulas (anything between $ or $$)
const mathPlaceholders = [];
text = text.replace(/\$\$([^\$]+)\$\$/g, (match, formula) => {
const placeholder = `___MATH_BLOCK_${mathPlaceholders.length}___`;
mathPlaceholders.push(formula);
return placeholder;
});
text = text.replace(/\$([^\$]+)\$/g, (match, formula) => {
const placeholder = `___MATH_INLINE_${mathPlaceholders.length}___`;
mathPlaceholders.push(formula);
return placeholder;
});

// Apply markdown formatting
text = text
.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>')
.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
.replace(/\*(.+?)\*/g,'<em>$1</em>')
.replace(/###\s+(.+)/g,'<h3 style="font-size:20px;font-weight:800;margin:20px 0 12px;">$1</h3>')
.replace(/##\s+(.+)/g,'<h2 style="font-size:24px;font-weight:800;margin:24px 0 16px;">$1</h2>')
.replace(/\n\n/g,'<br><br>')
.replace(/\n/g,'<br>');

// Restore math formulas with proper HTML
mathPlaceholders.forEach((formula, i) => {
if (text.includes(`___MATH_BLOCK_${i}___`)) {
text = text.replace(`___MATH_BLOCK_${i}___`, `<span style="display:block;margin:12px 0;font-family:monospace;background:rgba(255,255,255,0.05);padding:8px;border-radius:8px;">$${formula}$$</span>`);
}
if (text.includes(`___MATH_INLINE_${i}___`)) {
text = text.replace(`___MATH_INLINE_${i}___`, `<code style="background:rgba(255,255,255,0.1);padding:2px 6px;border-radius:4px;font-family:monospace;">$${formula}$</code>`);
}
});

return text;
}

async function handleFileUpload(event){
const files=Array.from(event.target.files);
for(const file of files){
const reader=new FileReader();
reader.onload=async(e)=>{
let content='';
if(file.type==='application/pdf'){
content='[PDF file uploaded]';
}else if(file.type.startsWith('image/')){
content='[Image file uploaded]';
}else{
content=e.target.result;
}
uploadedFiles.push({name:file.name,type:file.type,content:content});
displayUploadedFiles();
addMsg(`📎 Fichier ajouté: ${file.name}`,'ai');
};
if(file.type.startsWith('image/')){
reader.readAsDataURL(file);
}else{
reader.readAsText(file);
}
}
}

function displayUploadedFiles(){
const container=document.getElementById('uploadedFilesContainer');
container.innerHTML=uploadedFiles.map((f,i)=>`
<div class="uploaded-file">
<span>📎 ${f.name}</span>
<span class="remove-file" onclick="removeFile(${i})">✕</span>
</div>
`).join('');
}

function removeFile(index){
uploadedFiles.splice(index,1);
displayUploadedFiles();
addMsg('Fichier retiré','ai');
}

function showRevToast(msg, type='info') {
  let t = document.getElementById('_revToast');
  if (!t) {
    t = document.createElement('div');
    t.id = '_revToast';
    t.style.cssText = 'position:fixed;bottom:24px;right:24px;border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;z-index:2000;transition:all 0.3s;color:white;opacity:0;transform:translateY(10px);';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.background = type === 'error' ? '#1a0808' : '#081a08';
  t.style.border = type === 'error' ? '1px solid rgba(239,68,68,0.4)' : '1px solid rgba(16,185,129,0.35)';
  t.style.opacity = '1'; t.style.transform = 'translateY(0)';
  clearTimeout(t._timer);
  t._timer = setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(10px)'; }, 2800);
}
function fadeNavigate(url){
document.body.style.opacity='0';
setTimeout(()=>window.location.href=url,400);
}
