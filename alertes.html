<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alertes & News - ScorePilot</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0a0a0a;color:white;min-height:100vh;padding:32px;transition:opacity 0.4s ease;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}
.container{position:relative;z-index:1;max-width:900px;margin:0 auto;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:48px;}
.header-left{display:flex;align-items:center;gap:24px;}
.back-btn{width:48px;height:48px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all 0.3s;}
.back-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.05);}
.mark-all-btn{padding:10px 20px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:rgba(255,255,255,0.6);font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.mark-all-btn:hover{background:rgba(255,255,255,0.09);color:white;}

/* TABS */
.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:4px;margin-bottom:32px;}
.tab{flex:1;padding:10px;border:none;background:transparent;color:rgba(255,255,255,0.45);font-size:14px;font-weight:600;border-radius:10px;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.tab.active{background:rgba(255,255,255,0.08);color:white;}
.tab-badge{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;font-size:10px;font-weight:800;padding:2px 6px;border-radius:100px;min-width:18px;text-align:center;}

/* SECTIONS */
.section{margin-bottom:36px;}
.section-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.4);margin-bottom:16px;text-transform:uppercase;letter-spacing:1.5px;}

/* NOTIFICATION ITEM */
.notif-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-left:3px solid;border-radius:16px;padding:20px;margin-bottom:12px;transition:all 0.25s;cursor:pointer;position:relative;}
.notif-item:hover{background:rgba(255,255,255,0.06);transform:translateX(4px);}
.notif-item.unread{border-left-width:4px;}
.notif-item.unread::before{content:'';position:absolute;top:50%;left:-6px;transform:translateY(-50%);width:8px;height:8px;border-radius:50%;background:#6366f1;box-shadow:0 0 6px #6366f1;}
.notif-header{display:flex;align-items:flex-start;gap:14px;margin-bottom:8px;}
.notif-icon{font-size:22px;flex-shrink:0;margin-top:2px;}
.notif-title{font-size:16px;font-weight:700;line-height:1.3;}
.notif-desc{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6;margin-bottom:8px;}
.notif-time{font-size:11px;color:rgba(255,255,255,0.3);font-weight:500;}
.notif-del{position:absolute;top:14px;right:14px;width:24px;height:24px;background:rgba(239,68,68,0.1);border:none;border-radius:6px;color:rgba(239,68,68,0.6);font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all 0.2s;}
.notif-item:hover .notif-del{display:flex;}
.notif-del:hover{background:rgba(239,68,68,0.2);color:#ef4444;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 40px;}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:0.3;}
.empty-text{font-size:16px;color:rgba(255,255,255,0.3);}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <div class="back-btn" onclick="window.location.href='dashboard.html'">←</div>
      <div>
        <div style="font-size:32px;font-weight:900;">🔔 Alertes & News</div>
        <div style="font-size:13px;color:rgba(255,255,255,0.4);" id="unreadLabel">Chargement...</div>
      </div>
    </div>
    <button class="mark-all-btn" onclick="markAllRead()">Tout marquer comme lu</button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabAll" onclick="switchTab('all')">
      Tout <span class="tab-badge" id="badgeAll" style="display:none;"></span>
    </button>
    <button class="tab" id="tabAdmin" onclick="switchTab('admin')">
      📢 Admin <span class="tab-badge" id="badgeAdmin" style="display:none;"></span>
    </button>
    <button class="tab" id="tabNews" onclick="switchTab('news')">🗞️ News</button>
    <button class="tab" id="tabActivity" onclick="switchTab('activity')">📊 Activité</button>
  </div>

  <div id="contentAll"></div>
  <div id="contentAdmin" style="display:none;"></div>
  <div id="contentNews" style="display:none;"></div>
  <div id="contentActivity" style="display:none;"></div>
</div>

<script>
let userId = '';
let adminNotifs = [];
let currentTab = 'all';

// News et activité statiques (contenu ScorePilot)
const STATIC_NEWS = [
  { id:'n1', icon:'🤖', title:'Mode Révision IA disponible', desc:"Isidor, ton assistant IA, est maintenant disponible pour t'aider dans tes révisions. Pose-lui des questions et révise de manière guidée.", time:'Il y a 2 jours', color:'#6366f1', type:'news' },
  { id:'n2', icon:'✅', title:'Synchronisation EcoleDirecte', desc:"Connecte ton compte EcoleDirecte dans Paramètres pour synchroniser tes notes automatiquement.", time:'Il y a 5 jours', color:'#10b981', type:'news' },
  { id:'n3', icon:'🏆', title:'Système de rangs lancé', desc:"Gagne des RR en révisant et grimpe dans le classement. Atteins le rang Grand Champion !", time:'Il y a 1 semaine', color:'#f59e0b', type:'news' },
];

const STATIC_ACTIVITY = [
  { id:'a1', icon:'🎯', title:'Plan de révision disponible', desc:"L'IA a généré 3 plans personnalisés dans Prévisions IA. Choisis celui qui te correspond.", time:'Aujourd\'hui', color:'#6366f1', type:'activity' },
  { id:'a2', icon:'⚠️', title:'Tâches en attente', desc:"Tu as des tâches urgentes dans tes Priorités. N'oublie pas de les traiter !", time:'Il y a 1 heure', color:'#f59e0b', type:'activity' },
  { id:'a3', icon:'📚', title:'Nouvelle session possible', desc:"Tu n'as pas révisé aujourd'hui. Lance une session pour maintenir ton streak !", time:'Aujourd\'hui', color:'#818cf8', type:'activity' },
];

document.body.style.opacity = '0';
window.addEventListener('load', () => {
  const user = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
  if (!user.name) { window.location.href = 'login-revolut.html'; return; }
  userId = user.id || user.name.replace(/\s+/g, '_').toLowerCase();
  loadAdminNotifs();
  render();
  setTimeout(() => document.body.style.opacity = '1', 50);
});

function sanitizeNotifs(notifs) {
  // Corriger les notifs avec icône manquante (stockées par l'ancienne version)
  return notifs.map(n => ({ ...n, icon: n.icon || '📢' }));
}

function loadAdminNotifs() {
  // Lire depuis la clé que notifs-admin.html écrit
  const raw = localStorage.getItem(`sp_notifs_${userId}`);
  adminNotifs = raw ? sanitizeNotifs(JSON.parse(raw)) : [];
  
  // Aussi vérifier la clé scorepilot_notifs_ pour compatibilité
  const raw2 = localStorage.getItem(`scorepilot_notifs_${userId}`);
  if (raw2) {
    const extra = sanitizeNotifs(JSON.parse(raw2));
    // Fusionner sans doublons
    extra.forEach(n => { if (!adminNotifs.find(x => x.id === n.id)) adminNotifs.push(n); });
  }
  
  // Trier par date décroissante
  adminNotifs.sort((a, b) => b.id - a.id);
}

function saveAdminNotifs() {
  localStorage.setItem(`sp_notifs_${userId}`, JSON.stringify(adminNotifs));
}

function countUnread() {
  return adminNotifs.filter(n => !n.read).length;
}

function render() {
  const unread = countUnread();
  document.getElementById('unreadLabel').textContent = unread > 0 ? `${unread} non lue${unread > 1 ? 's' : ''}` : 'Tout est lu ✓';

  // Badges
  const badgeAll = document.getElementById('badgeAll');
  const badgeAdmin = document.getElementById('badgeAdmin');
  if (unread > 0) {
    badgeAll.textContent = unread; badgeAll.style.display = 'inline-block';
    badgeAdmin.textContent = unread; badgeAdmin.style.display = 'inline-block';
  } else {
    badgeAll.style.display = 'none';
    badgeAdmin.style.display = 'none';
  }

  renderAll();
  renderAdmin();
  renderNews();
  renderActivity();
}

function renderAll() {
  const allItems = [
    ...adminNotifs.map(n => ({ ...n, _src: 'admin' })),
    ...STATIC_NEWS.map(n => ({ ...n, read: true, _src: 'news' })),
    ...STATIC_ACTIVITY.map(n => ({ ...n, read: true, _src: 'activity' })),
  ];
  // Admin first, then rest
  const sorted = [
    ...allItems.filter(n => n._src === 'admin'),
    ...allItems.filter(n => n._src !== 'admin'),
  ];
  document.getElementById('contentAll').innerHTML = sorted.length
    ? sorted.map(n => notifHTML(n)).join('')
    : emptyHTML('Aucune notification');
}

function renderAdmin() {
  document.getElementById('contentAdmin').innerHTML = adminNotifs.length
    ? `<div class="section"><div class="section-title">📢 Notifications de l'équipe</div>${adminNotifs.map(n => notifHTML({ ...n, _src: 'admin' })).join('')}</div>`
    : emptyHTML("Aucune notification de l'admin pour l'instant");
}

function renderNews() {
  document.getElementById('contentNews').innerHTML =
    `<div class="section"><div class="section-title">🎉 Nouveautés</div>${STATIC_NEWS.map(n => notifHTML(n)).join('')}</div>`;
}

function renderActivity() {
  document.getElementById('contentActivity').innerHTML =
    `<div class="section"><div class="section-title">📊 Ton activité</div>${STATIC_ACTIVITY.map(n => notifHTML(n)).join('')}</div>`;
}

function notifHTML(n) {
  const isAdmin = n._src === 'admin';
  const borderColor = n.color || '#6366f1';
  const icon = n.icon || '🔔';

  // Créer via DOM pour éviter tout problème d'encodage emoji
  const wrapper = document.createElement('div');
  wrapper.className = 'notif-item' + (!n.read ? ' unread' : '');
  wrapper.style.borderLeftColor = borderColor;
  if (isAdmin) wrapper.onclick = () => markRead(String(n.id));

  if (isAdmin) {
    const del = document.createElement('button');
    del.className = 'notif-del';
    del.textContent = '✕';
    del.onclick = (e) => { e.stopPropagation(); deleteNotif(String(n.id)); };
    wrapper.appendChild(del);
  }

  const header = document.createElement('div');
  header.className = 'notif-header';

  const iconEl = document.createElement('span');
  iconEl.className = 'notif-icon';
  iconEl.textContent = icon;   // textContent = emoji sans encodage HTML
  header.appendChild(iconEl);

  const titleWrap = document.createElement('div');
  const titleEl = document.createElement('div');
  titleEl.className = 'notif-title';
  titleEl.textContent = n.title || '';
  titleWrap.appendChild(titleEl);
  header.appendChild(titleWrap);
  wrapper.appendChild(header);

  const desc = document.createElement('div');
  desc.className = 'notif-desc';
  desc.textContent = n.desc || n.message || '';
  wrapper.appendChild(desc);

  const time = document.createElement('div');
  time.className = 'notif-time';
  time.textContent = n.time || formatTime(n.id);
  wrapper.appendChild(time);

  return wrapper.outerHTML;
}

function emptyHTML(msg) {
  return `<div class="empty-state"><div class="empty-icon">🔔</div><div class="empty-text">${msg}</div></div>`;
}

function markRead(id) {
  const n = adminNotifs.find(x => String(x.id) === String(id));
  if (n && !n.read) { n.read = true; saveAdminNotifs(); render(); }
}

function deleteNotif(id) {
  adminNotifs = adminNotifs.filter(n => String(n.id) !== String(id));
  saveAdminNotifs();
  render();
}

function markAllRead() {
  adminNotifs.forEach(n => n.read = true);
  saveAdminNotifs();
  render();
}

function switchTab(tab) {
  currentTab = tab;
  ['all','admin','news','activity'].forEach(t => {
    document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
    document.getElementById('content' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
  });
}

function formatTime(id) {
  if (!id || isNaN(id)) return 'Récemment';
  const diff = Date.now() - Number(id);
  const min = Math.floor(diff / 60000);
  if (min < 1) return 'À l\'instant';
  if (min < 60) return `Il y a ${min} min`;
  const h = Math.floor(min / 60);
  if (h < 24) return `Il y a ${h}h`;
  const d = Math.floor(h / 24);
  return `Il y a ${d} jour${d > 1 ? 's' : ''}`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
