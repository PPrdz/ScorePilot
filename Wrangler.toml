# Cloudflare Pages configuration
# This file is for the ED proxy Worker only
# The Pages site itself needs no wrangler.toml — just _headers and _redirects

name = "scorepilot-ed-proxy"
main = "cloudflare-worker-ed-proxy.js"
compatibility_date = "2024-01-01"

[vars]
# Variables d'environnement publiques (pas de secrets ici)
APP_NAME = "ScorePilot"


# ─── Exclusion explicite des assets lourds ────────────────────────────────────
# Cloudflare Pages limite les assets à 25 MiB par fichier.
# node_modules ne doit JAMAIS être dans le repo — supprimer et ajouter au .gitignore
# Si tu déploies via la CLI wrangler, utilise les options ci-dessous :

[assets]
directory = "."
# Fichiers exclus du déploiement (ne pas uploader node_modules)
# Note: la meilleure solution est de ne PAS committer node_modules dans git.
# Supprime-le : git rm -r --cached node_modules && git commit -m "Remove node_modules"
