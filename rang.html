<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rang & Classement</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
<style>
:root {
  --sf: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'Inter', monospace;
  --accent: #ff4655;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a0f;color:white;min-height:100vh;padding:32px;font-family:var(--sf);-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;top:0;left:0;width:100%;height:100%;background-image:radial-gradient(circle, rgba(255,255,255,0.04) 1px, transparent 1px);background-size:24px 24px;pointer-events:none;z-index:0;}

/* RADIAL BACKGROUND GLOW */
#bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;transition:background 1s ease;}

.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;}

/* HEADER */
.header{display:flex;align-items:center;gap:20px;margin-bottom:40px;}
.back-btn{width:48px;height:48px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:20px;transition:all 0.3s;}
.back-btn:hover{background:rgba(255,255,255,0.08);transform:scale(1.05);}
.header-title{font-size:28px;font-weight:900;letter-spacing:1px;}
.header-sub{font-size:13px;font-weight:400;color:rgba(255,255,255,0.4);margin-top:4px;letter-spacing:0;}

/* RANK HERO */
.rank-hero{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:24px;
  padding:48px 40px;
  text-align:center;
  margin-bottom:24px;
  position:relative;
  overflow:hidden;
}
.rank-hero::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--rank-color,rgba(255,70,85,0.8)),transparent);
}
.rank-hero::after{
  content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:60%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);
}

.rank-badge-container{position:relative;display:inline-block;margin-bottom:28px;}
.rank-glow-ring{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:220px;height:220px;border-radius:50%;filter:blur(55px);animation:glowPulse 4s ease-in-out infinite;pointer-events:none;}
@keyframes glowPulse{0%,100%{opacity:0.3;}50%{opacity:0.55;}}

/* SVG EMBLEM */
.emblem-wrap{
  position:relative;width:160px;height:160px;margin:0 auto;
}
.emblem-glow{position:absolute;inset:-40px;border-radius:50%;opacity:0;filter:blur(40px);transition:background 0.5s;animation:glow-pulse 3s ease-in-out infinite;}
@keyframes glow-pulse{0%,100%{opacity:0.35;transform:scale(0.9);}50%{opacity:0.6;transform:scale(1.1);}}
.orbit{position:absolute;inset:-8px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.07);animation:orbit-spin 12s linear infinite;}
@keyframes orbit-spin{to{transform:rotate(360deg);}}
.orbit::before,.orbit::after{content:'';position:absolute;width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,0.28);}
.orbit::before{top:-2px;left:50%;transform:translateX(-50%);}
.orbit::after{bottom:-2px;left:50%;transform:translateX(-50%);}
#emblem-svg{width:100%;height:100%;position:relative;z-index:1;}

.rank-name{
  font-family:'Montserrat',sans-serif;
  font-size:48px;font-weight:900;margin-bottom:6px;letter-spacing:4px;text-transform:uppercase;
  color:var(--rank-color,#fff);
  text-shadow:0 0 40px var(--rank-glow,rgba(255,70,85,0.4));
  transition:color 0.5s,text-shadow 0.5s;
}
.rank-label{font-size:10px;font-weight:600;letter-spacing:6px;color:rgba(255,255,255,0.25);text-transform:uppercase;margin-bottom:36px;}

/* PROGRESS */
.progress-wrap{max-width:480px;margin:0 auto;}
.progress-meta{display:flex;justify-content:space-between;margin-bottom:10px;font-size:12px;letter-spacing:1px;}
.progress-meta span:first-child{color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:2px;font-size:10px;}
.progress-meta span:last-child{font-family:var(--mono);color:rgba(255,255,255,0.7);}
.progress-track{height:4px;background:rgba(255,255,255,0.07);border-radius:100px;overflow:hidden;margin-bottom:10px;position:relative;}
.progress-fill{height:100%;background:var(--rank-color,#ff4655);border-radius:100px;transition:width 0.8s cubic-bezier(0.25,0.46,0.45,0.94),background 0.5s;}
.progress-fill::after{content:'';position:absolute;right:0;top:-3px;bottom:-3px;width:2px;background:white;box-shadow:0 0 8px 2px rgba(255,255,255,0.6);}
.next-rank-text{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:3px;text-transform:uppercase;font-family:var(--mono);}

/* SECTION */
.section{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:16px;padding:28px 32px;margin-bottom:20px;position:relative;}
.section::before{content:'';position:absolute;top:0;left:24px;width:40px;height:2px;background:var(--accent);}
.section-title{font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:24px;display:flex;align-items:center;gap:12px;}
.section-title::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.05);}

/* MATCH HISTORY */
.match-item{
  display:flex;align-items:center;gap:20px;padding:14px 16px;
  border-left:2px solid;border-radius:10px;margin-bottom:8px;
  transition:all 0.2s;background:rgba(0,0,0,0.2);
  cursor:default;
}
.match-item:hover{background:rgba(255,255,255,0.04);transform:translateX(3px);}
.match-item.win{border-left-color:#10b981;}
.match-item.loss{border-left-color:#ef4444;}
.match-emblem{width:48px;height:48px;flex-shrink:0;}
.match-info{flex:1;}
.match-title{font-size:14px;font-weight:700;letter-spacing:0.5px;margin-bottom:4px;}
.match-date{font-size:10px;color:rgba(255,255,255,0.35);font-family:var(--mono);letter-spacing:1px;}
.match-rr{padding:10px 18px;background:rgba(0,0,0,0.3);border-radius:10px;text-align:center;min-width:80px;border:1px solid rgba(255,255,255,0.05);}
.match-rr-change{font-size:20px;font-weight:800;font-family:var(--mono);}
.match-rr-change.positive{color:#10b981;}
.match-rr-change.negative{color:#ef4444;}
.match-rr-total{font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;letter-spacing:1px;font-family:var(--mono);}

/* LEADERBOARD */
.leaderboard-item{
  display:flex;align-items:center;gap:16px;padding:16px;
  background:rgba(0,0,0,0.15);border:1px solid rgba(255,255,255,0.04);
  border-radius:16px;margin-bottom:10px;cursor:pointer;transition:all 0.2s;
}
.leaderboard-item:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.1);}
.leaderboard-item.me{border-color:rgba(255,70,85,0.3);background:rgba(255,70,85,0.04);}
.pos-badge{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;letter-spacing:0;flex-shrink:0;font-family:var(--mono);}
.pos-top{background:rgba(255,215,0,0.12);color:#FFD700;border:1px solid rgba(255,215,0,0.2);}
.pos-normal{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.07);}
.student-avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#ff4655,#ff8f99);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;object-fit:cover;flex-shrink:0;}
.student-name{font-size:15px;font-weight:700;letter-spacing:0.5px;margin-bottom:5px;}
.student-rank-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);border-radius:6px;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.lb-emblem{width:22px;height:22px;}
.student-pts{padding:10px 16px;background:rgba(0,0,0,0.3);border-radius:10px;text-align:center;border:1px solid rgba(255,255,255,0.05);}
.student-pts-val{font-size:18px;font-weight:800;font-family:var(--mono);color:var(--rank-color,#ff4655);}
.student-pts-lbl{font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}

/* PROFILE MODAL */
.profile-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);backdrop-filter:blur(12px);z-index:1000;display:none;align-items:center;justify-content:center;}
.profile-modal.show{display:flex;}
.profile-card{
  background:rgba(10,10,15,0.98);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;width:360px;overflow:hidden;
  position:relative;
}
.profile-card-top{
  padding:32px 28px 24px;text-align:center;
  border-bottom:1px solid rgba(255,255,255,0.06);
  background:rgba(255,255,255,0.015);
  position:relative;overflow:hidden;
}
.profile-card-top::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--modal-color,#ff4655),transparent);}
.profile-emblem-wrap{width:100px;height:100px;margin:0 auto 16px;position:relative;}
.profile-emblem-glow{position:absolute;inset:-20px;border-radius:50%;filter:blur(20px);animation:glow-pulse 3s ease-in-out infinite;}
.profile-name{font-size:22px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.profile-status{font-size:9px;padding:5px 14px;border-radius:6px;display:inline-block;letter-spacing:3px;text-transform:uppercase;font-weight:700;}
.status-admin{background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.4);animation:adminPulse 2s infinite;}
@keyframes adminPulse{0%,100%{box-shadow:0 0 12px rgba(239,68,68,0.3);}50%{box-shadow:0 0 20px rgba(239,68,68,0.5);}}
.status-collaborateur{background:rgba(139,92,246,0.15);color:#a78bfa;border:1px solid rgba(139,92,246,0.4);}
.status-pro{background:rgba(255,215,0,0.1);color:#FFD700;border:1px solid rgba(255,215,0,0.3);}
.status-free{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:1px solid rgba(255,255,255,0.08);}
.profile-body{padding:20px 28px 28px;}
.profile-stat-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04);}
.profile-stat-row:last-of-type{border-bottom:none;}
.profile-stat-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.35);}
.profile-stat-val{font-size:14px;font-weight:700;font-family:var(--mono);}
.close-btn{
  width:100%;padding:13px;background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);border-radius:10px;
  color:rgba(255,255,255,0.6);font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  transition:all 0.2s;font-family:var(--sf);margin-top:4px;
}
.close-btn:hover{background:rgba(255,255,255,0.08);color:white;border-color:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div id="bg-glow"></div>

<div class="container">
  <div class="header">
    <div class="back-btn" onclick="fadeBack()">←</div>
    <div>
      <div class="header-title">Rang & Classement</div>
      <div class="header-sub">Classement Compétitif</div>
    </div>
    <button onclick="window.location.href='tous-les-rangs-valorant.html'" style="
      margin-left: auto;
      padding: 10px 20px;
      background: rgba(99,102,241,0.1);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 12px;
      color: #818cf8;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
      font-family: var(--sf);
    " onmouseover="this.style.background='rgba(99,102,241,0.2)'; this.style.borderColor='rgba(99,102,241,0.5)'" onmouseout="this.style.background='rgba(99,102,241,0.1)'; this.style.borderColor='rgba(99,102,241,0.3)'">
      📖 Tous les rangs
    </button>
  </div>

  <!-- RANK HERO -->
  <div class="rank-hero" id="rankHero">
    <div class="rank-badge-container">
      <div class="rank-glow-ring" id="rankGlow"></div>
      <div class="emblem-wrap">
        <div class="emblem-glow" id="emblemGlow"></div>
        <div class="orbit"></div>
        <svg id="emblem-svg" class="emblem-svg" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="rg" cx="50%" cy="40%" r="60%">
              <stop id="gs0" offset="0%"/>
              <stop id="gs1" offset="55%"/>
              <stop id="gs2" offset="100%"/>
            </radialGradient>
            <filter id="blur-sm"><feGaussianBlur stdDeviation="2"/></filter>
            <filter id="blur-md"><feGaussianBlur stdDeviation="6"/></filter>
          </defs>
          <g id="shape-group"></g>
        </svg>
      </div>
    </div>
    <div class="rank-name" id="rankName">BRONZE</div>
    <div class="rank-label">CLASSEMENT COMPÉTITIF</div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <span>Progression</span>
        <span id="pointsDisplay">0/100 RR</span>
      </div>
      <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <div class="next-rank-text" id="nextRank">100 RR pour le prochain rang</div>
    </div>
  </div>

  <!-- MATCH HISTORY -->
  <div class="section">
    <div class="section-title">Historique des Matchs</div>
    <div id="matchHistoryList"></div>
  </div>

  <!-- LEADERBOARD -->
  <div class="section">
    <div class="section-title">Classement Global</div>
    <div id="leaderboardList"></div>
  </div>
</div>

<!-- PROFILE MODAL -->
<div class="profile-modal" id="profileModal" onclick="if(event.target===this)closeProfile()">
  <div class="profile-card" onclick="event.stopPropagation()">
    <div class="profile-card-top">
      <div class="profile-emblem-wrap">
        <div class="profile-emblem-glow" id="profileEmblemGlow"></div>
        <svg id="profile-emblem-svg" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%;position:relative;z-index:1;">
          <defs>
            <radialGradient id="rg2" cx="50%" cy="40%" r="60%">
              <stop id="pg0" offset="0%"/>
              <stop id="pg1" offset="55%"/>
              <stop id="pg2" offset="100%"/>
            </radialGradient>
            <filter id="blur-sm2"><feGaussianBlur stdDeviation="2"/></filter>
            <filter id="blur-md2"><feGaussianBlur stdDeviation="6"/></filter>
          </defs>
          <g id="profile-shape"></g>
        </svg>
      </div>
      <img id="profileAvatar" style="display:none;width:90px;height:90px;border-radius:50%;margin:0 auto 16px;object-fit:cover;"/>
      <div class="profile-name" id="profileName">Utilisateur</div>
      <span class="profile-status" id="profileStatus">FREE</span>
    </div>
    <div class="profile-body">
      <div class="profile-stat-row">
        <div class="profile-stat-label">Points RR</div>
        <div class="profile-stat-val" id="profilePoints" style="color:#ff4655;">0</div>
      </div>
      <div class="profile-stat-row">
        <div class="profile-stat-label">Rang</div>
        <div class="profile-stat-val" id="profileRank">—</div>
      </div>
      <div class="profile-stat-row">
        <div class="profile-stat-label">Position</div>
        <div class="profile-stat-val" id="profilePosition" style="color:#f59e0b;">#—</div>
      </div>
      <button class="close-btn" onclick="closeProfile()">Fermer</button>
    </div>
  </div>
</div>

<script>
// ─── RANK DATA (mirroring rank-promotion.html tiers) ──────────────────────────
const TIERS = [
  { name:'UNRANKED', sub:[''], color:'#4a4a4a', glow:'#666', bg:['#080808','#0c0c0c'], shape:'unranked', points:[[0,0]] },
  { name:'NOVICE',   sub:['I','II','III'], color:'#8e9aaf', glow:'#8e9aaf', bg:['#0a0b0d','#0f1015'], shape:'novice',     points:[[0,100],[100,200],[200,300]] },
  { name:'INITIÉ',   sub:['I','II','III'], color:'#b87333', glow:'#d4894a', bg:['#0d0a06','#120e08'], shape:'initie',     points:[[300,400],[400,500],[500,600]] },
  { name:'RIVAL',    sub:['I','II','III'], color:'#b0b8c8', glow:'#d0daea', bg:['#0b0c0e','#111318'], shape:'rival',      points:[[600,700],[700,800],[800,900]] },
  { name:'CHALLENGER',sub:['I','II','III'],color:'#e8b84b', glow:'#f5cc6a', bg:['#0e0c04','#161209'], shape:'challenger', points:[[900,1000],[1000,1100],[1100,1200]] },
  { name:'EXPERT',   sub:['I','II','III'], color:'#2dd4b8', glow:'#4eecd4', bg:['#030f0d','#051512'], shape:'expert',     points:[[1200,1300],[1300,1400],[1400,1500]] },
  { name:'MAÎTRE',   sub:['I','II','III'], color:'#9b7fe8', glow:'#b9a0f5', bg:['#07040f','#0d0819'], shape:'maitre',     points:[[1500,1600],[1600,1700],[1700,1800]] },
  { name:'ÉLITE',    sub:['I','II','III'], color:'#3ddc84', glow:'#5af0a0', bg:['#020c05','#041208'], shape:'elite',      points:[[1800,1900],[1900,2000],[2000,2100]] },
  { name:'CHAMPION', sub:['I','II','III'], color:'#ff6b6b', glow:'#ff8f8f', bg:['#0f0404','#180606'], shape:'champion',   points:[[2100,2200],[2200,2300],[2300,2400]] },
  { name:'GRAND CHAMPION', sub:[''], color:'#fff9e6', glow:'#ffe066', bg:['#0e0d04','#181500'], shape:'grand', points:[[2400,99999]] },
];

const RANKS = [];
TIERS.forEach(tier => {
  tier.sub.forEach((s, i) => {
    RANKS.push({
      name: s ? `${tier.name} ${s}` : tier.name,
      tierName: tier.name,
      color: tier.color,
      glow: tier.glow,
      bg: tier.bg,
      shape: tier.shape,
      subRank: i,
      points: tier.points[i] || [0, 100],
    });
  });
});

function getCurrentRank(pts) {
  let found = RANKS[1];
  for (let r of RANKS) {
    if (pts >= r.points[0]) found = r;
    else break;
  }
  return found;
}

// ─── SHAPE DEFINITIONS (from rank-promotion.html) ─────────────────────────────
function getShape(type, color, glow, subRank = 0, gradId = 'rg', blurId = 'blur-md') {
  const r = subRank;
  const shapes = {
    unranked: () => `
      <path d="M90 22 A68 68 0 0 1 150 60" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
      <path d="M154 80 A68 68 0 0 1 154 100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-linecap="round"/>
      <path d="M148 118 A68 68 0 0 1 90 158" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
      <path d="M72 156 A68 68 0 0 1 30 118" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-linecap="round"/>
      <path d="M24 98 A68 68 0 0 1 30 62" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1" stroke-linecap="round"/>
      <path d="M46 40 A68 68 0 0 1 72 24" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-linecap="round"/>
      <circle cx="90" cy="90" r="46" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
      <text x="90" y="104" text-anchor="middle" font-size="58" font-family="Inter,sans-serif" font-weight="900" fill="rgba(255,255,255,0.18)" letter-spacing="-2">?</text>
      <circle cx="90" cy="90" r="32" fill="rgba(255,255,255,0.03)" filter="url(#${blurId})"/>
      <circle cx="90" cy="90" r="3" fill="rgba(255,255,255,0.08)"/>
    `,
    novice: () => `
      ${r >= 1 ? `<circle cx="90" cy="90" r="68" stroke="${color}" stroke-width="1" stroke-opacity="0.3"/>` : ''}
      <circle cx="90" cy="90" r="54" stroke="${color}" stroke-width="0.5" stroke-opacity="${r>=1?'0.3':'0.15'}"/>
      <circle cx="90" cy="90" r="38" fill="url(#${gradId})" opacity="0.9"/>
      <circle cx="90" cy="90" r="38" fill="url(#${gradId})" filter="url(#${blurId})" opacity="0.3"/>
      ${r >= 1 ? `<circle cx="90" cy="90" r="26" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>` : ''}
      ${r >= 2 ? `
        <polygon points="90,20 93.5,26 90,32 86.5,26" fill="${color}" opacity="0.65"/>
        <polygon points="90,148 93.5,154 90,160 86.5,154" fill="${color}" opacity="0.65"/>
        <polygon points="20,90 26,93.5 32,90 26,86.5" fill="${color}" opacity="0.65"/>

function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// Build small inline SVG for leaderboard / match history
function buildSmallSVG(rank, size=44) {
  return `<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}" style="display:block;">
    <defs>
      <radialGradient id="rg_sm_${rank.shape}${rank.subRank}" cx="50%" cy="40%" r="60%">
        <stop offset="0%" stop-color="${rank.color}"/>
        <stop offset="55%" stop-color="${rank.glow}"/>
        <stop offset="100%" stop-color="${rank.bg[0] === '#000' ? '#111' : rank.bg[0]}"/>
      </radialGradient>
      <filter id="blur-md-sm"><feGaussianBlur stdDeviation="6"/></filter>
      <filter id="blur-sm-sm"><feGaussianBlur stdDeviation="2"/></filter>
    </defs>
    <g>${getShape(rank.shape, rank.color, rank.glow, rank.subRank, 'rg_sm_'+rank.shape+rank.subRank, 'blur-md-sm')}</g>
  </svg>`;
}

// Récupérer l'utilisateur depuis sessionStorage (nouveau système)
const sessionUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
const userId = (sessionUser.name || 'demo').replace(/\s+/g, '_').toLowerCase();

// Récupérer les données de rang depuis le nouveau système (sp_rank_${userId})
const rankDataStore = JSON.parse(localStorage.getItem(`sp_rank_${userId}`) || '{}');
const userPoints = rankDataStore.points || 0;
const userRankName = rankDataStore.rank || 'NOVICE I';

// Status de l'utilisateur
const savedUsers = JSON.parse(localStorage.getItem('sp_users') || localStorage.getItem('scorepilot_users') || '{}');
let userStatus = 'FREE';
if (savedUsers[userId]?.status) userStatus = savedUsers[userId].status;

// Vérifier les rôles actifs
const rolesData = localStorage.getItem(`scorepilot_roles_${userId}`);
if (rolesData) {
  try {
    const roles = JSON.parse(rolesData);
    const activeRoles = roles.filter(r => r.expiresAt === -1 || r.expiresAt > Date.now());
    if (activeRoles.length > 0) {
      const priority = { ADMIN: 3, COLLABORATEUR: 2, PRO: 1 };
      activeRoles.sort((a, b) => (priority[b.role] || 0) - (priority[a.role] || 0));
      userStatus = activeRoles[0].role;
    }
  } catch (e) {}
}

const currentUser = { name: sessionUser.name || userId, status: userStatus };

// ─── UPDATE RANK DISPLAY ──────────────────────────────────────────────────────
function updateRankDisplay() {
  // Récupérer les données actuelles à chaque appel
  const freshRankData = JSON.parse(localStorage.getItem(`sp_rank_${userId}`) || '{}');
  const currentPoints = freshRankData.points || userPoints || 0;
  
  const rank = getCurrentRank(currentPoints);
  const [lo, hi] = rank.points;
  const progress = hi === 99999 ? 100 : Math.min(100, ((currentPoints - lo) / (hi - lo)) * 100);
  const remaining = hi === 99999 ? 0 : hi - currentPoints;

  // Colors
  document.documentElement.style.setProperty('--rank-color', rank.color);
  document.getElementById('rankGlow').style.background = hexToRgba(rank.glow, 0.5);
  document.getElementById('emblemGlow').style.background = hexToRgba(rank.glow, 0.25);
  document.getElementById('bg-glow').style.background =
    `radial-gradient(ellipse at 50% 30%, ${hexToRgba(rank.glow, 0.06)} 0%, transparent 60%)`;

  // Gradient stops
  document.getElementById('gs0').setAttribute('stop-color', rank.color);
  document.getElementById('gs1').setAttribute('stop-color', rank.glow);
  document.getElementById('gs2').setAttribute('stop-color', rank.bg[0] === '#000' ? '#111' : rank.bg[0]);

  // Shape
  document.getElementById('shape-group').innerHTML = getShape(rank.shape, rank.color, rank.glow, rank.subRank);

  // Text
  document.getElementById('rankName').textContent = rank.name;
  document.getElementById('rankName').style.color = rank.color;
  document.getElementById('rankName').style.textShadow = `0 0 40px ${hexToRgba(rank.glow, 0.45)}`;

  // Progress
  document.getElementById('progressFill').style.width = progress + '%';
  document.getElementById('progressFill').style.background = rank.color;
  document.getElementById('pointsDisplay').textContent = `${currentPoints} / ${hi === 99999 ? '∞' : hi} RR`;

  const nextRankObj = RANKS[RANKS.indexOf(rank) + 1];
  document.getElementById('nextRank').textContent = nextRankObj
    ? `${remaining} RR pour ${nextRankObj.name}`
    : 'Rang maximum atteint';
}

// ─── MATCH HISTORY ────────────────────────────────────────────────────────────
function loadMatchHistory() {
  const history = JSON.parse(localStorage.getItem(`sp_revision_history_${userId}`) || '[]');
  const list = document.getElementById('matchHistoryList');
  if (history.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:32px;color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:3px;text-transform:uppercase;font-family:var(--mono);">Aucun match enregistré</div>';
    return;
  }
  const recent = history.slice(-7).reverse();
  list.innerHTML = recent.map(match => {
    const rankData = getCurrentRank(match.pointsBefore);
    const change = match.rrGain;
    const isPositive = change >= 0;
    return `
    <div class="match-item ${isPositive?'win':'loss'}">
      <div class="match-emblem">${buildSmallSVG(rankData, 44)}</div>
      <div class="match-info">
        <div class="match-title">${match.title}</div>
        <div class="match-date">${formatDate(match.date)}</div>
      </div>
      <div class="match-rr">
        <div class="match-rr-change ${isPositive?'positive':'negative'}">${isPositive?'+':''}${change}</div>
        <div class="match-rr-total">${match.pointsAfter} RR</div>
      </div>
    </div>`;
  }).join('');
}

function formatDate(timestamp) {
  const d = new Date(timestamp), now = new Date();
  const diff = now - d;
  const hours = Math.floor(diff/3600000), days = Math.floor(diff/86400000);
  if (hours < 1) return 'Il y a moins d\'une heure';
  if (hours < 24) return `Il y a ${hours}h`;
  if (days === 1) return 'Hier';
  if (days < 7) return `Il y a ${days} jours`;
  return d.toLocaleDateString('fr-FR');
}

                       localStorage.getItem(`sp_roles_${uid}`);
      let roles = rolesData ? JSON.parse(rolesData) : [];
      roles = roles.filter(r => r.expiresAt === -1 || r.expiresAt > Date.now());
      
      // Déterminer le statut
      let status = userData.role?.toUpperCase() || userData.plan?.toUpperCase() || 'FREE';
      
      // Vérifier si c'est un admin (plusieurs façons de le détecter)
      if (userData.isAdmin === true || 
          status === 'ADMIN' || 
          roles.some(r => r.role === 'ADMIN')) {
        status = 'ADMIN';
      } else if (roles.length > 0) {
        const priority = { ADMIN: 3, COLLABORATEUR: 2, PRO: 1 };
        roles.sort((a, b) => (priority[b.role] || 0) - (priority[a.role] || 0));
        status = roles[0].role;
      }
      
      console.log(`User ${userData.name} (${uid}): status=${status}`);
      
      // FILTRER : Afficher SEULEMENT PRO/COLLABORATEUR/ADMIN
      if (status !== 'PRO' && status !== 'COLLABORATEUR' && status !== 'ADMIN') {
        console.log(`  ❌ Ignoré (status=${status})`);
        continue;
      }
      
      console.log(`  ✅ Ajouté au leaderboard`);
      
      // Récupérer les points
      const rankData = JSON.parse(localStorage.getItem(`sp_rank_${uid}`) || '{}');
      const pts = rankData.points || 0;
      
      users.push({
        name: userData.name || uid,
        userId: uid,
        points: pts,
        rank: getCurrentRank(pts),
        status,
        pin: userData.pin || userData.code || '—',
        isMe: uid === userId,
        wins: rankData.wins || 0,
        losses: rankData.losses || 0
      });
    }
  }
  
  console.log(`📊 Total users dans leaderboard: ${users.length}`);
  return users.sort((a, b) => b.points - a.points);
}

// ──── 1. PIN depuis l'inscription ────────────────────────────────────────────
function getUserPin(uid) {
  const userKey = `scorepilot_user_${uid}`;
  const userData = localStorage.getItem(userKey);
  if (userData) {
    const user = JSON.parse(userData);
    return user.pin || user.code || '—';
  }
  return '—';
}

// ──── 2. REMPLACER loadRealUsers pour TOUS les users ─────────────────────────
loadRealUsers = function() {
  const users = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('scorepilot_user_')) {
      const uid = key.replace('scorepilot_user_', '');
      const userData = JSON.parse(localStorage.getItem(key));
      const rankData = JSON.parse(localStorage.getItem(`sp_rank_${uid}`) || '{}');
      const pts = rankData.points || 0;
      users.push({
        name: userData.name || uid,
        userId: uid,
        points: pts,
        rank: getCurrentRank(pts),
        status: userData.role?.toUpperCase() || userData.plan?.toUpperCase() || 'FREE',
        pin: userData.pin || userData.code || '—',
        isMe: uid === userId,
        wins: rankData.wins || 0,
        losses: rankData.losses || 0
      });
    }
  }
  return users.sort((a, b) => b.points - a.points);
};

  const lastMatch = sessionStorage.getItem('lastMatch');
  if (urlParams.get('showResult') === 'true' && lastMatch) {
    showMatchResult(JSON.parse(lastMatch));
    sessionStorage.removeItem('lastMatch');
    window.history.replaceState({}, '', 'rang.html');
  }
}, 500);

// ──── 6. FONCTION POUR QUIZ ───────────────────────────────────────────────────
window.addMatchToRanking = function(quizData) {
  const currentUser = JSON.parse(sessionStorage.getItem('currentUser') || '{}');
  const uid = (currentUser.name || 'guest').replace(/\s+/g, '_').toLowerCase();
  const key = `sp_rank_${uid}`;
  let rankData = JSON.parse(localStorage.getItem(key) || '{}');
  if (!rankData.points) rankData.points = 0;
  if (!rankData.matches) rankData.matches = [];
  if (!rankData.wins) rankData.wins = 0;
  if (!rankData.losses) rankData.losses = 0;
  if (!rankData.totalMatches) rankData.totalMatches = 0;
  const score = Math.round((quizData.correctAnswers / quizData.totalQuestions) * 100);
  const isWin = score >= 70;
  let pointsChange = 0;
  if (isWin) { pointsChange = Math.floor(15 + ((score - 70) / 30) * 15); rankData.wins++; }
  else { pointsChange = -Math.floor(5 + ((70 - score) / 70) * 15); rankData.losses++; }
  rankData.points = Math.max(0, rankData.points + pointsChange);
  rankData.totalMatches++;
  const currentRank = getCurrentRank(rankData.points);
  rankData.rank = currentRank.name;
  const match = { id: Date.now(), date: Date.now(), title: quizData.subject || 'Révision générale', subject: quizData.subject || 'Non spécifié', questionsTotal: quizData.totalQuestions, correctAnswers: quizData.correctAnswers, score: score, result: isWin ? 'win' : 'loss', pointsChange: pointsChange, totalPoints: rankData.points, rankName: currentRank.name, wins: rankData.wins, losses: rankData.losses, totalMatches: rankData.totalMatches, duration: quizData.duration || 'N/A' };
  rankData.matches.push(match);
  if (rankData.matches.length > 50) rankData.matches = rankData.matches.slice(-50);
  localStorage.setItem(key, JSON.stringify(rankData));
  console.log('✅ Match ajouté:', match);
  return match;
};
