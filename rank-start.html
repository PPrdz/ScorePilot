<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rank Promotion</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@800;900&display=swap');

/* SF Pro fallback stack */
:root {
  --sf: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
  --mono: "SF Mono", "Fira Code", "Cascadia Code", monospace;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #000;
  font-family: var(--sf);
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}

/* ─── RANK SELECTOR ─── */
#selector {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 14px 16px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px) saturate(1.8);
  border-bottom: 0.5px solid rgba(255,255,255,0.08);
}

.rank-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 0.5px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.04);
  color: rgba(255,255,255,0.55);
  font-family: var(--sf);
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.2px;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.25,0.46,0.45,0.94);
  -webkit-font-smoothing: antialiased;
}
.rank-btn:hover {
  background: rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.85);
  border-color: rgba(255,255,255,0.25);
}
.rank-btn.active {
  background: var(--accent, rgba(255,255,255,0.15));
  color: #fff;
  border-color: transparent;
}

/* ─── SCENE ─── */
#scene {
  position: relative;
  width: 100vw;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#bg-canvas {
  position: absolute;
  inset: 0;
  transition: opacity 0.6s ease;
}

/* Grain overlay */
#grain {
  position: absolute;
  inset: 0;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
  pointer-events: none;
  z-index: 2;
}

/* Vignette */
#vignette {
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
  z-index: 2;
}

/* ─── EFFECTS LAYER ─── */
#fx {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 3;
  overflow: hidden;
}

.ring-expand {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0);
  border-radius: 50%;
  animation: ring-out 1.2s cubic-bezier(0.2, 0.8, 0.4, 1) forwards;
}
@keyframes ring-out {
  0%   { transform: translate(-50%,-50%) scale(0); opacity: 0.7; }
  100% { transform: translate(-50%,-50%) scale(10); opacity: 0; }
}

.spark {
  position: absolute;
  border-radius: 50%;
  animation: spark-fly 1.2s cubic-bezier(0.15, 0.85, 0.2, 1) forwards;
}
@keyframes spark-fly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  40%  { opacity: 1; }
  70%  { opacity: 0.6; }
  100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
}

.spark-trail {
  position: absolute;
  border-radius: 50%;
  animation: spark-fly 1.4s cubic-bezier(0.1, 0.9, 0.15, 1) forwards;
  filter: blur(1px);
}

.light-streak {
  position: absolute;
  height: 1.5px;
  transform-origin: left center;
  animation: streak 0.9s ease-out forwards;
  opacity: 0;
}
@keyframes streak {
  0%   { opacity: 0; transform: scaleX(0) rotate(var(--angle)); }
  20%  { opacity: 1; }
  100% { opacity: 0; transform: scaleX(1) rotate(var(--angle)); }
}

.flash-burst {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 50;
  animation: flash-out 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes flash-out {
  0%   { opacity: 0; }
  8%   { opacity: 0.05; }
  18%  { opacity: 0.35; }
  30%  { opacity: 0.75; }
  42%  { opacity: 1; }
  55%  { opacity: 0.6; }
  75%  { opacity: 0.2; }
  100% { opacity: 0; }
}

.shockwave {
  position: absolute;
  border-radius: 50%;
  border: 2px solid white;
  transform: translate(-50%, -50%);
  animation: shockwave-expand 0.8s ease-out forwards;
}
@keyframes shockwave-expand {
  0%   { width: 0px; height: 0px; opacity: 0.9; border-width: 3px; }
  100% { width: 800px; height: 800px; opacity: 0; border-width: 0.5px; }
}

/* ─── CONTENT ─── */
#content {
  position: relative;
  z-index: 10;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.label-top {
  font-family: var(--sf);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  opacity: 0;
  -webkit-font-smoothing: antialiased;
}
.label-sub {
  font-family: var(--sf);
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.25);
  margin-top: 6px;
  opacity: 0;
  -webkit-font-smoothing: antialiased;
}

/* ─── EMBLEM ─── */
#emblem-wrap {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 36px 0 32px;
  opacity: 0;
}

#emblem-glow {
  position: absolute;
  inset: -40px;
  border-radius: 50%;
  opacity: 0;
  filter: blur(40px);
  transition: background 0.4s;
  animation: glow-pulse 3s ease-in-out infinite;
}
@keyframes glow-pulse {
  0%,100% { opacity: 0.4; transform: scale(0.9); }
  50%      { opacity: 0.7; transform: scale(1.1); }
}

#orbit {
  position: absolute;
  inset: -8px;
  border-radius: 50%;
  border: 0.5px solid rgba(255,255,255,0.08);
  animation: orbit-spin 12s linear infinite;
}
@keyframes orbit-spin { to { transform: rotate(360deg); } }

#orbit::before, #orbit::after {
  content:'';
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
}
#orbit::before { top: -2px; left: 50%; transform: translateX(-50%); }
#orbit::after  { bottom: -2px; left: 50%; transform: translateX(-50%); }

#emblem-svg {
  width: 100%; height: 100%;
  position: relative;
  z-index: 1;
}

/* ─── RANK TEXT ─── */
#rank-name {
  font-family: 'Montserrat', sans-serif;
  font-size: 44px;
  font-weight: 900;
  letter-spacing: -1px;
  color: var(--rank-color, #fff);
  opacity: 0;
  -webkit-font-smoothing: antialiased;
  line-height: 1;
  text-transform: uppercase;
}

#rank-pts {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 2px;
  color: rgba(255,255,255,0.3);
  margin-top: 10px;
  opacity: 0;
}

#rank-tier-label {
  font-family: var(--sf);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.2);
  margin-top: 20px;
  opacity: 0;
  border-top: 0.5px solid rgba(255,255,255,0.08);
  padding-top: 14px;
  width: 200px;
